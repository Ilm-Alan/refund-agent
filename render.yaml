services:
  - type: web
    name: refund-agent
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_BASE_URL
        sync: false
      - key: ANTHROPIC_AUTH_TOKEN
        sync: false
      - key: AGENT_MODEL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: STT_MODEL
        sync: false
      - key: TTS_MODEL
        sync: false
      - key: TTS_VOICE
        sync: false
